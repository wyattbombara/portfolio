<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>tollsec</title>
  <meta property="og:title" content="tollsec">
  <meta property="og:description" content="hacktivist group — we are everywhere">
  <meta property="og:url" content="https://wyattbombara.github.io/portfolio/tollsec.html">
  <meta property="og:type" content="website">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28' fill='%2322c55e'>T</text></svg>">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #050505; }
    .page { --accent: #22c55e; }
    .glitch { color: var(--accent) !important; }
    .glitch::before { color: #f00; }
    .glitch::after { color: #0ff; }
    .terminal { border-color: #1a3a1a; }
    .terminal-bar { background: #0d1a0d; }
    .terminal-bar span:nth-child(1) { background: #ff5f56; }
    .terminal-bar span:nth-child(2) { background: #ffbd2e; }
    .terminal-bar span:nth-child(3) { background: #27c93f; }
    .ds-logo { width: 72px; height: 72px; margin: 0 auto 0.75rem; border: 2px solid var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; position: relative; animation: pulseGreen 2s ease-in-out infinite; }
    .ds-logo::before { content: ''; position: absolute; inset: 4px; border: 1px solid var(--accent); border-radius: 50%; opacity: 0.3; }
    .ds-logo span { font-size: 1.4rem; font-weight: 700; color: var(--accent); font-family: 'SFMono-Regular', Consolas, monospace; letter-spacing: 0.05em; }
    @keyframes pulseGreen { 0%, 100% { box-shadow: 0 0 8px rgba(34,197,94,0.2); } 50% { box-shadow: 0 0 24px rgba(34,197,94,0.5); } }
    body::after { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 999; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(34,197,94,0.02) 2px, rgba(34,197,94,0.02) 4px); }
    .terminal-line .highlight { color: #22c55e; }
    .hidden { display: none; }
    .input-line { display: flex; align-items: center; gap: 0.5rem; }
    .input-line input { background: transparent; border: none; color: var(--accent); font-family: inherit; font-size: inherit; outline: none; flex: 1; caret-color: var(--accent); }
  </style>
</head>
<body>
  <div class="page">
    <nav>
      <a href="index.html" class="logo">wyatt</a>
      <div class="nav-links">
        <button id="termBtn" class="term-btn">terminal</button>
        <button class="theme-toggle" id="themeToggle">light</button>
      </div>
    </nav>

    <main>
      <div class="terminal" id="tollsecTerminal">
        <div class="terminal-bar">
          <span></span><span></span><span></span>
          <span class="terminal-title">tollsec@gateway:~</span>
        </div>
        <div class="terminal-body" id="termBody">
          <div class="terminal-line"><span class="prompt">tollsec@gateway:~$</span> <span id="typedCmd"></span><span class="cursor" id="cmdCursor">_</span></div>
        </div>
      </div>
    </main>

    <div class="footer-clock" id="footerClock"></div>

    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.7rem;">
      <a href="index.html" style="color: var(--accent); opacity: 0.25;">.</a>
    </div>
  </div>

  <script>
    (function() {
      const body = document.getElementById('termBody');
      const cmdLine = document.getElementById('typedCmd');
      const cursor = document.getElementById('cmdCursor');
      const cmd = 'sudo apt install join-us';
      let i = 0;

      function typeCmd() {
        if (i < cmd.length) {
          cmdLine.textContent += cmd[i];
          i++;
          setTimeout(typeCmd, 50);
        } else {
          cursor.style.display = 'none';
          setTimeout(showOutput, 500);
        }
      }

      function showOutput() {
        const lines = [
          '<br>',
          '<div style="text-align:center;">',
          '  <div class="ds-logo"><span>T</span></div>',
          '  <div class="glitch" data-text="tollsec" style="font-size:0.8rem;text-transform:uppercase;letter-spacing:0.15em;color:var(--accent);margin-bottom:0.5rem;">tollsec</div>',
          '  <div style="color:var(--text-muted);font-size:0.82rem;line-height:1.7;">we are everywhere. you just don\'t see us.</div>',
          '  <div style="color:var(--text-dim);font-size:0.75rem;font-style:italic;margin:0.5rem 0;">the system is broken — we\'re just the ones who know it.</div>',
          '  <a href="#" class="btn" style="display:inline-block;border-color:var(--accent);color:var(--accent);margin-top:0.5rem;">join us?</a>',
          '</div>',
          '<br>',
          '<div class="terminal-line"><span class="prompt">tollsec@gateway:~$</span> <span class="cursor">_</span></div>',
        ];
        body.innerHTML += lines.join('');
      }

      setTimeout(typeCmd, 400);
    })();
  </script>
  <script src="script.js"></script>
</body>
</html>

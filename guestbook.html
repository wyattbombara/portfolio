<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>guestbook - Wyatt</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='28' font-size='28'>W</text></svg>">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <nav>
      <a href="index.html" class="logo">wyatt</a>
      <div class="nav-links">
        <a href="now.html">now</a>
        <a href="uses.html">uses</a>
        <a href="skills.html">skills</a>
        <a href="guestbook.html">guestbook</a>
        <a href="pentest.html">pentest</a>
        <button class="theme-toggle" id="themeToggle">light</button>
      </div>
    </nav>

    <main>
      <div class="card" style="text-align: center;">
        <div style="font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.5rem; transition: color 0.3s;">guestbook</div>
        <p style="color: var(--text-muted); font-size: 0.82rem; margin-bottom: 1rem;">signs a github issue</p>
        <form id="gb-form" style="margin-bottom: 1.5rem;">
          <input type="text" id="gb-name" placeholder="name" required style="width:100%;padding:0.5rem 0.75rem;margin-bottom:0.5rem;background:var(--tag-bg);border:1px solid var(--border-light);border-radius:6px;color:var(--text);font-family:inherit;font-size:0.85rem;">
          <textarea id="gb-msg" rows="2" placeholder="message" required style="width:100%;padding:0.5rem 0.75rem;margin-bottom:0.5rem;background:var(--tag-bg);border:1px solid var(--border-light);border-radius:6px;color:var(--text);font-family:inherit;font-size:0.85rem;resize:none;"></textarea>
          <button type="submit" class="btn" style="width:100%;">sign</button>
        </form>
        <div id="gb-entries" style="text-align: left;"></div>
      </div>
    </main>

    <div class="footer-clock" id="footerClock"></div>

    <div style="text-align: center; margin-top: 1.5rem; font-size: 0.7rem; color: var(--text-dim);">
      <a href="tollsec.html" style="color: #161616;">.</a>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
